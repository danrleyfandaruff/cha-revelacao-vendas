<ion-content>
  <div class="login-wrap">

    <div class="login-logo">
      <span>🍼</span>
      <h1 class="playfair">Chá Revelação</h1>
      <p>Plataforma de listas de presentes</p>
    </div>

    <!-- ── FORMULÁRIO ── -->
    <div class="login-card">

        <!-- Tabs -->
        <div class="login-tabs">
          <button class="ltab" [class.active]="tab() === 'entrar'" (click)="setTab('entrar')">
            Entrar
          </button>
          <button class="ltab" [class.active]="tab() === 'cadastrar'" (click)="setTab('cadastrar')">
            Criar conta
          </button>
        </div>

        <!-- Form -->
        <div class="login-form">
          <div class="field-group">
            <label class="label-small">E-mail</label>
            <input class="text-input" type="email" [(ngModel)]="email"
              placeholder="seu@email.com" autocomplete="email"/>
          </div>
          <div class="field-group">
            <label class="label-small">Senha</label>
            <input class="text-input" type="password" [(ngModel)]="password"
              placeholder="••••••••" (keydown.enter)="submit()"/>
            @if (tab() === 'cadastrar') {
              <span class="field-hint">Mínimo 6 caracteres</span>
            }
          </div>

          <ion-button expand="block" (click)="submit()" [disabled]="loading()">
            @if (loading()) {
              <ion-spinner name="dots"></ion-spinner>
            } @else {
              {{ tab() === 'entrar' ? 'Entrar' : 'Criar conta' }}
            }
          </ion-button>

        </div>

      </div>

  </div>


</ion-content>
